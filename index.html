<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- GREETING SECTION -->
  <header class="greeting-section">
    <div class="greeting-content">
      <p id="greeting-text" class="greeting-text">Good morning!</p>
      <h1 id="current-time" class="current-time">00:00:00</h1>
      <p id="current-date" class="current-date">Loading date...</p>
    </div>
  </header>

  <main class="dashboard">

    <!-- FOCUS TIMER -->
    <section class="card timer-card">
      <h2 class="card-title">Focus Timer</h2>
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="timer-start">Start</button>
        <button class="btn btn-secondary" id="timer-stop">Stop</button>
        <button class="btn btn-ghost" id="timer-reset">Reset</button>
      </div>
      <p class="timer-label" id="timer-label">Ready to focus?</p>
    </section>

    <!-- TO-DO LIST -->
    <section class="card todo-card">
      <h2 class="card-title">To-Do List</h2>
      <div class="todo-input-row">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="Add a new task..."
          maxlength="120"
        />
        <button class="btn btn-primary" id="todo-add">Add</button>
      </div>
      <ul class="todo-list" id="todo-list">
        <!-- tasks rendered here -->
      </ul>
      <p class="todo-empty" id="todo-empty">No tasks yet. Add one above!</p>
    </section>

    <!-- QUICK LINKS -->
    <section class="card links-card">
      <h2 class="card-title">Quick Links</h2>
      <div class="links-input-row">
        <input
          type="text"
          id="link-name-input"
          class="link-input"
          placeholder="Label"
          maxlength="30"
        />
        <input
          type="url"
          id="link-url-input"
          class="link-input link-url"
          placeholder="https://example.com"
        />
        <button class="btn btn-primary" id="link-add">Add</button>
      </div>
      <div class="links-grid" id="links-grid">
        <!-- links rendered here -->
      </div>
      <p class="links-empty" id="links-empty">No links yet. Add your favorites!</p>
    </section>

  </main>

  <!-- EDIT TASK MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">Edit Task</h3>
      <input type="text" id="modal-input" class="todo-input" maxlength="120" aria-label="Edit task" placeholder="Edit task..." />
      <div class="modal-actions">
        <button class="btn btn-primary" id="modal-save">Save</button>
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
